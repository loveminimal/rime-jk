# === 辅助码 ===
# -------------------------------------
# abbrev|^(.+);.*$|$1|                  纯双拼的情况「✓ 简拼」
# derive|^(.+);.*$|$1|                  纯双拼的情况「✗ 简拼」
# derive|^(.+);(\w)(\w).*$|$1$2|        双拼+一位辅助码的情况
# abbrev|^(.+);(\w)(\w).*$|$1$2$3|      双拼+2位辅助码的情况，abbrev类型不可以整句内输入2位辅助码，必须加o
# derive|^(.+);(\w)(\w).*$|$1$2$3o|     整句模式下，输入syffo 出单字 增强单字性能
# derive|^(.+);.*?,(\w)(\w).*$|$1$2|    双拼+一位辅助码的情况
# abbrev|^(.+);.*?,(\w)(\w).*$|$1$2$3|  双拼+2位辅助码的情况，abbrev类型不可以整句内输入2位辅助码，必须加o
# derive|^(.+);.*?,(\w)(\w).*$|$1$2$3o| 整句模式下，输入syffo 出单字 增强单字性能
# erase/^(.+);(.+)$/                    删除原始编码加速检索「🧪」
# -------------------------------------
algebra_aux:
  # - abbrev|^(.+);.*$|$1|               
  - derive|^(.+);.*$|$1|                 
  - derive|^(.+);(\w)(\w).*$|$1$2|       
  - abbrev|^(.+);(\w)(\w).*$|$1$2$3|     
  - derive|^(.+);(\w)(\w).*$|$1$2$3o|    
  - derive|^(.+);.*?,(\w)(\w).*$|$1$2|   
  - abbrev|^(.+);.*?,(\w)(\w).*$|$1$2$3| 
  - derive|^(.+);.*?,(\w)(\w).*$|$1$2$3o|
  - erase/^(.+);(.+)$/


# === 形码整句 ===
# -------------------------------------
# 适用于五笔整句、虎码整句
# -------------------------------------
algebra_zj:
  # - abbrev/^([a-z]).+$/$1/
  - derive/^([a-z])$/$1/
  # - abbrev|^(.+);.*$|$1|               
  - derive|^(.+);.*$|$1|                 
  - derive|^(.+);(\w)(\w).*$|$1$2|       
  - abbrev|^(.+);(\w)(\w).*$|$1$2$3|     
  - derive|^(.+);(\w)(\w).*$|$1$2$3o|    
  - derive|^(.+);.*?,(\w)(\w).*$|$1$2|   
  - abbrev|^(.+);.*?,(\w)(\w).*$|$1$2$3| 
  - derive|^(.+);.*?,(\w)(\w).*$|$1$2$3o|
  - erase/^(.+);(.+)$/

